<!DOCTYPE html>
<html>
<head>
<title>Trading Dashboard</title>
<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}
.box {
  margin-top: 100px;
}
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  background: green;
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <h1>Trading Dashboard</h1>
  <h2>Balance: $1000</h2>

  <button onclick="buy()">BUY</button>
  <button onclick="sell()">SELL</button>
</div>

<script>
function buy() {
  alert("Buy Trade Opened");
}

function sell() {
  alert("Sell Trade Opened");
}
</script>

</body>
</html>
