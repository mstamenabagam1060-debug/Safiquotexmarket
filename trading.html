<!DOCTYPE html>
<html>
<head>
<title>Trading</title>

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
}

.buy {
  background: green;
  color: white;
}

.sell {
  background: red;
  color: white;
}
</style>

</head>

<body>

<h1>Trading Dashboard</h1>
<h3>Balance: $1000</h3>

<button class="buy" onclick="buy()">BUY</button>
<button class="sell" onclick="sell()">SELL</button>

<script>
function buy() {
  alert("Buy order placed!");
}

function sell() {
  alert("Sell order placed!");
}
</script>

</body>
</html>
