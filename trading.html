<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center;">

<h1>Trading</h1>
<h2 id="bal">Balance: 1000</h2>

<button onclick="buy()">BUY</button>
<button onclick="sell()">SELL</button>

<script>
let b = 1000;

function buy(){
 b = b - 100;
 document.getElementById("bal").innerText = "Balance: " + b;
}

function sell(){
 b = b + 100;
 document.getElementById("bal").innerText = "Balance: " + b;
}
</script>

</body>
</html>
