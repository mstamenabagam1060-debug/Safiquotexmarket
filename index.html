<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ট্রেডিং প্রো</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #020617;
}

.logo {
  color: #22c55e;
  font-weight: bold;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
}

.register {
  background: #22c55e;
}

.hero {
  text-align: center;
  padding: 50px 20px;
}

.start {
  margin-top: 20px;
  background: #22c55e;
  font-size: 16px;
}

.card {
  background: #020617;
  margin: 10px;
  padding: 20px;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  <div class="logo">AI Trade</div>
  <div>
    <button>লগইন</button>
    <button class="register">রেজিস্টার</button>
  </div>
</header>

<section class="hero">
  <h1>AI দিয়ে স্মার্ট ট্রেডিং</h1>
  <p>AI সিগন্যাল ব্যবহার করে আয় করুন</p>
  <button class="start">Start Trading</button>
</section>

<section class="hero">
  <div class="card">
    <h2>৳ ১,০০০+</h2>
    <p>দৈনিক আয়</p>
  </div>

  <div class="card">
    <h2>১০,০০০+</h2>
    <p>ইউজার</p>
  </div>

  <div class="card">
    <h2>৯৫%</h2>
    <p>সফলতা</p>
  </div>
</section>

<section class="hero">
  <h2>কিভাবে কাজ করে?</h2>
  <p>আমাদের AI মার্কেট বিশ্লেষণ করে ট্রেডিং সিগন্যাল দেয়</p>
</section>

<footer class="hero">
  <p>© 2026 AI Trade | Demo Website</p>
</footer>

</body>
</html>
