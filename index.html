
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trade Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #020617;
}

.btn {
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  margin: 5px;
}

.login { background: #ccc; }
.register { background: #22c55e; color: white; }

.main {
  margin-top: 50px;
}

.start {
  background: #22c55e;
  color: white;
  padding: 15px 25px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="nav">
  <h3>AI Trade</h3>
  <div>
    <button class="btn login" onclick="login()">লগইন</button>
    <button class="btn register" onclick="register()">রেজিস্টার</button>
  </div>
</div>

<div class="main">
  <h1>AI দিয়ে স্মার্ট ট্রেডিং</h1>
  <p>AI সিগনাল ব্যবহার করে আয় করুন</p>

  <button class="start" onclick="startTrading()">Start Trading</button>
</div>

<script>
function login() {
  alert("Login system coming soon!");
}

function register() {
  alert("Register system coming soon!");
}

function startTrading() {
  alert("Trading start hoise!");
}
</script>

</body>
</html>
